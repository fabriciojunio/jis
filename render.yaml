# render.yaml — Deploy gratuito no Render.com
# Documentação: https://render.com/docs/blueprint-spec

services:

  # ── BACKEND (Spring Boot) ────────────────────────────────────────
  - type: web
    name: jis-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false  # preencha no painel do Render: Settings → Environment
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          name: jis-ml-service
          type: web
          property: host
          envVarKey: ML_SERVICE_URL
      - key: EMAIL_ENABLED
        value: "true"
      - key: EMAIL_RECIPIENT
        value: "junioad555@gmail.com"
      - key: EMAIL_FROM
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SCHEDULER_CRON
        value: "0 0 19 * * *"

  # ── ML SERVICE (Python FastAPI) ──────────────────────────────────
  - type: web
    name: jis-ml-service
    runtime: docker
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service
    plan: free
    healthCheckPath: /health
    disk:
      name: ml-models
      mountPath: /app/models
      sizeGB: 1
