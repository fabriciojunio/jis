name: JIS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────
  # TESTES PYTHON (ML Service)
  # ─────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd ml-service
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ml-service/coverage.xml
          flags: python
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # TESTES JAVA (Backend)
  # ─────────────────────────────────────────
  test-java:
    name: Java Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -f backend/pom.xml test -Dspring.profiles.active=test -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: java
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # LINT E BUILD FRONTEND (Next.js)
  # ─────────────────────────────────────────
  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─────────────────────────────────────────
  # BUILD DOCKER (apenas na main)
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-python, test-java, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jis-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/jis-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jis-ml:latest
            ${{ secrets.DOCKER_USERNAME }}/jis-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # DEPLOY (apenas na main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy backend to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Deploy ML service to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ML }}"

      - name: Deploy frontend to Vercel
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
