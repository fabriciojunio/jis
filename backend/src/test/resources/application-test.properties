spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

spring.cache.type=simple

ml.service.url=http://localhost:8000

# Email desabilitado em testes (JavaMailSender sera mockado pelo Mockito)
notification.email.enabled=false
notification.email.recipient=test@test.com
notification.email.from=test@test.com
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# Scheduler desabilitado em testes
scheduler.daily.cron=0 0 19 * * *

logging.level.com.jis=DEBUG
