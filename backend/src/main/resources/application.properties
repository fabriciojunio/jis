spring.application.name=jis-backend

# Database (Supabase)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jis_db}
spring.datasource.username=${DB_USER:jis_user}
spring.datasource.password=${DB_PASSWORD:jis_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Cache (simples, sem Redis)
spring.cache.type=simple

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# Email (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Notification
notification.email.enabled=${EMAIL_ENABLED:false}
notification.email.recipient=${EMAIL_RECIPIENT:junioad555@gmail.com}
notification.email.from=${EMAIL_FROM:${MAIL_USERNAME:noreply@jis.app}}

# Scheduler (padrao: 19h todos os dias, horario de Brasilia)
scheduler.daily.cron=${SCHEDULER_CRON:0 0 19 * * *}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.jis=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
